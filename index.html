<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parcial nº1 - Aplicaciones para Dispositivos Móviles</title>

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <div id="app">
      <com-header :carrito="carrito" @ver-carrito="verCarrito"></com-header>
      <!-- El modal -->
      <div v-if="mostrarCarrito" class="modal">
        <h2>Tu carrito</h2>
        <div v-for="item in carrito" :key="item.nombre">
          <span v-text="item.nombre"></span>
          <span v-text="item.precio"></span>
          <button @click="quitarDelCarrito(item)">Quitar</button>
        </div>
        <p>Total: {{ calcularValor }}</p>
        <button @click="vaciarCarrito">Vaciar carrito</button>
        <button @click="mostrarCarrito">Cerrar</button>
      </div>
      <main>
        <div v-for="product in products" :key="product.id" class="card">
          <com-product
            :nombre="product.name"
            :imagen="product.image"
            :precio="product.price"
            @agregar-al-carrito="agregarAlCarrito"
          ></com-product>
        </div>
      </main>
      <com-footer></com-footer>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="script/main.js"></script>
  </body>
</html>
